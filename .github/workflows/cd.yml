# =====================================================
# CD — Build & Push image to GHCR, then deploy to VM
#      via SSH using docker compose
# Runs when a version tag (v*) is pushed.
# Independent from CI (does not wait for CI results).
#
# Required GitHub secrets:
#   VM_HOST      - Server public IP or hostname
#   VM_USER      - SSH user on the server
#   VM_SSH_KEY   - Private key for that user
#
# One-time server setup:
#   - Docker + Docker Compose plugin installed
#   - App directory (see DEPLOY_PATH) containing a .env file with:
#     PORT, DB_USER, DB_PASSWORD, DB_ROOT_PASSWORD, DB_DATABASE,
#     JWT_SECRET, CORS_ORIGIN, GOOGLE_*, GEMINI_API_KEY
# =====================================================
name: CD

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: ~/hackathon-server

jobs:
  # ---------- CD Stage 1: build & push image ----------
  push-image:
    name: "CD / Build & Push Image (GHCR)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          IMAGE="${IMAGE_NAME@L}:${GITHUB_REF_NAME}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t "${{ steps.meta.outputs.image }}" .

      - name: Push image to GHCR
        run: docker push "${{ steps.meta.outputs.image }}"

  # ---------- CD Stage 2: deploy to server ----------
  deploy:
    name: "CD / Deploy to VM (docker compose)"
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.push-image.outputs.image }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: APP_IMAGE
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            echo "Deploying image: $APP_IMAGE"
            export APP_IMAGE
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
