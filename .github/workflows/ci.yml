# =====================================================
# CI — Code Verification (install + build + docker build)
# Runs on every pull request. Does NOT deploy anything.
# =====================================================
name: CI

on:
  pull_request:

jobs:
  build:
    name: "CI / Install & Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript compile)
        run: npm run build

      - name: Verify Docker image builds
        run: docker build -t hackathon-server:ci .
